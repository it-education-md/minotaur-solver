# Champion Auto-Merge — verifies on-chain attestation before merging.
#
# When a miner's solver wins the benchmark and passes champion consensus,
# the leader API records the certification on BT EVM's ChampionRegistry
# and creates a PR (not a direct push). This Action:
#   1. Extracts the on-chain tx hash + round ID from the PR body
#   2. Queries the ChampionRegistry on BT EVM to verify the certification
#   3. Checks the on-chain commitHash matches the PR's head commit
#   4. Auto-merges if valid — blocks if not
#
# The leader CANNOT push to main directly (branch protection enforced).
# Only this Action can merge, and only after on-chain verification.

name: Champion Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-champion:
    runs-on: ubuntu-latest
    # Only run on champion/ branches (created by the leader API)
    if: startsWith(github.head_ref, 'champion/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry (for cast CLI)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Extract certification data from PR body
        id: extract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Parse HTML comments from PR body
          TX_HASH=$(echo "$PR_BODY" | grep -oP '(?<=<!-- CHAMPION_TX_HASH: )\S+(?= -->)')
          ROUND_ID=$(echo "$PR_BODY" | grep -oP '(?<=<!-- CHAMPION_ROUND_ID: )\S+(?= -->)')
          COMMIT_HASH=$(echo "$PR_BODY" | grep -oP '(?<=<!-- CHAMPION_COMMIT_HASH: )\S+(?= -->)')
          SUBMISSION_ID=$(echo "$PR_BODY" | grep -oP '(?<=<!-- CHAMPION_SUBMISSION_ID: )\S+(?= -->)')

          echo "tx_hash=$TX_HASH" >> $GITHUB_OUTPUT
          echo "round_id=$ROUND_ID" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "submission_id=$SUBMISSION_ID" >> $GITHUB_OUTPUT

          echo "Extracted:"
          echo "  TX Hash: $TX_HASH"
          echo "  Round ID: $ROUND_ID"
          echo "  Commit Hash: $COMMIT_HASH"
          echo "  Submission ID: $SUBMISSION_ID"

          # Fail fast if required fields are missing
          if [ -z "$TX_HASH" ] || [ "$TX_HASH" = "pending" ]; then
            echo "::error::Missing or pending on-chain TX hash"
            exit 1
          fi
          if [ -z "$ROUND_ID" ] || [ "$ROUND_ID" = "unknown" ]; then
            echo "::error::Missing round ID"
            exit 1
          fi
          if [ -z "$COMMIT_HASH" ]; then
            echo "::error::Missing commit hash"
            exit 1
          fi

      - name: Verify on-chain certification
        id: verify
        env:
          BTEVM_RPC_URL: https://lite.chain.opentensor.ai
          CHAMPION_REGISTRY: ${{ vars.CHAMPION_REGISTRY_ADDRESS }}
          ROUND_ID: ${{ steps.extract.outputs.round_id }}
          COMMIT_HASH: ${{ steps.extract.outputs.commit_hash }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ -z "$CHAMPION_REGISTRY" ]; then
            echo "::error::CHAMPION_REGISTRY_ADDRESS repository variable not set"
            exit 1
          fi

          # Convert round_id string to bytes32 (keccak256 hash, matching Python _str_to_bytes32)
          ROUND_BYTES32=$(cast keccak "$(echo -n "$ROUND_ID")")

          echo "Querying ChampionRegistry at $CHAMPION_REGISTRY..."
          echo "  Round ID: $ROUND_ID"
          echo "  Round bytes32: $ROUND_BYTES32"

          # Retry logic for BT EVM RPC (can be flaky)
          VERIFIED=false
          for ATTEMPT in 1 2 3; do
            echo "Attempt $ATTEMPT/3..."

            # Check if the round is certified
            IS_CERTIFIED=$(cast call "$CHAMPION_REGISTRY" \
              "isChampionCertified(bytes32)(bool)" \
              "$ROUND_BYTES32" \
              --rpc-url "$BTEVM_RPC_URL" 2>/dev/null || echo "RPC_ERROR")

            if [ "$IS_CERTIFIED" = "RPC_ERROR" ]; then
              echo "  RPC call failed, retrying in $((ATTEMPT * 10))s..."
              sleep $((ATTEMPT * 10))
              continue
            fi

            echo "  Certified: $IS_CERTIFIED"

            if [ "$IS_CERTIFIED" != "true" ]; then
              echo "::error::Round $ROUND_ID is NOT certified on-chain"
              exit 1
            fi

            # Get the full champion record
            RECORD=$(cast call "$CHAMPION_REGISTRY" \
              "getChampion(bytes32)((bytes32,bytes32,bytes32,bytes32,uint256,uint256,uint256,bool))" \
              "$ROUND_BYTES32" \
              --rpc-url "$BTEVM_RPC_URL" 2>/dev/null || echo "RPC_ERROR")

            if [ "$RECORD" = "RPC_ERROR" ]; then
              echo "  getChampion RPC failed, retrying..."
              sleep $((ATTEMPT * 10))
              continue
            fi

            echo "  Record: $RECORD"

            # Extract commitHash from the record (4th field, bytes32)
            # The record tuple is (roundId, candidateSubmissionId, candidateImageId,
            # commitHash, effectiveEpoch, certifiedAt, approvalCount, exists)
            ONCHAIN_COMMIT=$(echo "$RECORD" | awk -F',' '{print $4}' | tr -d ' ')

            # Convert PR head SHA to bytes32 (keccak hash, matching _str_to_bytes32)
            EXPECTED_COMMIT=$(cast keccak "$(echo -n "$COMMIT_HASH")")

            echo "  On-chain commitHash: $ONCHAIN_COMMIT"
            echo "  Expected commitHash: $EXPECTED_COMMIT"

            if [ "$ONCHAIN_COMMIT" != "$EXPECTED_COMMIT" ]; then
              echo "::error::Commit hash mismatch! On-chain: $ONCHAIN_COMMIT, Expected: $EXPECTED_COMMIT"
              exit 1
            fi

            # Verify PR head SHA matches the commit hash from the PR body
            # Support short commit hashes (7+ chars) from older attestations
            if [ ${#COMMIT_HASH} -lt 40 ]; then
              if [ "${PR_HEAD_SHA:0:${#COMMIT_HASH}}" != "$COMMIT_HASH" ]; then
                echo "::error::PR head SHA prefix (${PR_HEAD_SHA:0:${#COMMIT_HASH}}) does not match certified commit ($COMMIT_HASH)"
                exit 1
              fi
              # Use the full PR_HEAD_SHA for on-chain comparison
              COMMIT_HASH="$PR_HEAD_SHA"
            elif [ "$PR_HEAD_SHA" != "$COMMIT_HASH" ]; then
              echo "::error::PR head SHA ($PR_HEAD_SHA) does not match certified commit ($COMMIT_HASH)"
              exit 1
            fi

            # Extract approval count (7th field)
            APPROVAL_COUNT=$(echo "$RECORD" | awk -F',' '{print $7}' | tr -d ' ')
            echo "  Approval count: $APPROVAL_COUNT"

            # Query required quorum
            QUORUM=$(cast call "$CHAMPION_REGISTRY" \
              "getQuorumRequired()(uint256)" \
              --rpc-url "$BTEVM_RPC_URL" 2>/dev/null || echo "0")
            echo "  Quorum required: $QUORUM"

            if [ "$APPROVAL_COUNT" -lt "$QUORUM" ] 2>/dev/null; then
              echo "::error::Insufficient approvals: $APPROVAL_COUNT < $QUORUM"
              exit 1
            fi

            VERIFIED=true
            break
          done

          if [ "$VERIFIED" != "true" ]; then
            echo "::error::Verification failed after 3 attempts"
            exit 1
          fi

          echo "verified=true" >> $GITHUB_OUTPUT
          echo ""
          echo "=== VERIFICATION PASSED ==="
          echo "  Round: $ROUND_ID"
          echo "  Commit: $COMMIT_HASH"
          echo "  Approvals: $APPROVAL_COUNT / $QUORUM"

      - name: Auto-merge PR
        if: steps.verify.outputs.verified == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "On-chain verification passed — merging champion PR..."
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge \
            --subject "Champion merged: ${{ steps.extract.outputs.submission_id }} (round ${{ steps.extract.outputs.round_id }})"
